<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pilotage Odoo — Cogitime</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root{
  --bg: #12161F;
  --surface: #1B2130;
  --surface-raised: #242B3D;
  --border: #313A4F;
  --text-primary: #EDEFF4;
  --text-secondary: #8D93A6;
  --accent-teal: #45B8AC;
  --accent-amber: #E3A548;
  --accent-coral: #E2725B;
  --accent-lavender: #8C8FA3;
  color-scheme: dark;
}

*{box-sizing:border-box;}
#app{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text-primary);
  min-height:600px;
  padding:0;
  display:flex;
  flex-direction:column;
  gap:0;
}

h1,h2,h3,.display{
  font-family:'Space Grotesk',sans-serif;
}

.mono{
  font-family:'IBM Plex Mono',monospace;
}

/* --- KPI bar --- */
.kpi-bar{
  display:flex;
  gap:1px;
  background:var(--border);
  border-bottom:1px solid var(--border);
}
.kpi{
  flex:1;
  background:var(--surface);
  padding:16px 20px;
}
.kpi-label{
  font-size:11px;
  letter-spacing:0.08em;
  text-transform:uppercase;
  color:var(--text-secondary);
  margin-bottom:6px;
}
.kpi-value{
  font-size:28px;
  font-weight:600;
  font-family:'Space Grotesk',sans-serif;
}
.kpi-value.teal{color:var(--accent-teal);}

.kpi-nav-btn{
  border:none;
  cursor:pointer;
  text-align:left;
  font-family:'Inter',sans-serif;
  display:flex;
  align-items:center;
  font-size:14px;
  font-weight:600;
  color:var(--text-primary);
  transition:background 0.15s;
}
.kpi-nav-btn:hover{background:var(--surface-raised);}
.kpi-nav-btn.active{
  background:#1E2A2C;
  color:var(--accent-teal);
}
.kpi-value.amber{color:var(--accent-amber);}
.kpi-value.coral{color:var(--accent-coral);}

/* --- Layout --- */
.main-layout{
  display:flex;
  flex:1;
  min-height:520px;
}

.sidebar{
  width:280px;
  background:var(--surface);
  border-right:1px solid var(--border);
  padding:16px;
  overflow-y:auto;
}
.sidebar-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
}
.sidebar-title{
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:0.08em;
  color:var(--text-secondary);
}

.project-card{
  background:var(--surface-raised);
  border:1px solid var(--border);
  border-radius:6px;
  padding:12px;
  margin-bottom:8px;
  cursor:pointer;
  transition:border-color 0.15s;
}
.project-card:hover{
  border-color:var(--accent-lavender);
}
.project-card.selected{
  border-color:var(--accent-teal);
  background:#1E2A2C;
}
.project-card-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  margin-bottom:6px;
}
.project-client{
  font-weight:600;
  font-size:14px;
}
.project-ref{
  font-size:10px;
  color:var(--text-secondary);
}
.health-dot{
  width:8px;height:8px;border-radius:50%;
  flex-shrink:0;
  margin-top:4px;
}
.health-dot.ok{background:var(--accent-teal);}
.health-dot.attention{background:var(--accent-amber);}
.health-dot.bloque{background:var(--accent-coral);}

.mini-pipeline{
  display:flex;
  gap:2px;
  margin-top:8px;
}
.mini-seg{
  height:4px;
  flex:1;
  border-radius:2px;
  background:var(--border);
}
.mini-seg.done{background:var(--accent-lavender);}
.mini-seg.current.ok{background:var(--accent-teal);}
.mini-seg.current.attention{background:var(--accent-amber);}
.mini-seg.current.bloque{background:var(--accent-coral);}

.btn{
  font-family:'Inter',sans-serif;
  font-size:13px;
  font-weight:500;
  padding:8px 14px;
  border-radius:5px;
  border:1px solid var(--border);
  background:var(--surface-raised);
  color:var(--text-primary);
  cursor:pointer;
  transition:all 0.15s;
}
.btn:hover{border-color:var(--accent-lavender);}
.btn-primary{
  background:var(--accent-teal);
  color:#0A1A18;
  border:none;
  font-weight:600;
}
.btn-primary:hover{opacity:0.9;}
.btn-full{width:100%;}
.btn-small{
  padding:4px 10px;
  font-size:12px;
}
.btn-ghost{
  background:transparent;
  border:1px solid var(--border);
}

/* --- Main panel --- */
.main-panel{
  flex:1;
  padding:24px 28px;
  overflow-y:auto;
}
.empty-state{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100%;
  color:var(--text-secondary);
  gap:8px;
}

.panel-header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  margin-bottom:16px;
}
.panel-title{
  font-size:22px;
  font-weight:600;
}
.panel-sub{
  color:var(--text-secondary);
  font-size:13px;
  margin-top:4px;
}
.panel-actions{
  display:flex;
  gap:8px;
}

.section-label{
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:0.08em;
  color:var(--text-secondary);
  margin:20px 0 10px;
}

.pipeline{
  display:flex;
  gap:4px;
}
.pipeline-seg{
  flex:1;
  padding:10px 6px;
  text-align:center;
  border-radius:5px;
  background:var(--surface-raised);
  border:1px solid var(--border);
  font-size:11px;
  color:var(--text-secondary);
  cursor:pointer;
}
.pipeline-seg.done{
  background:#26302A;
  color:var(--accent-lavender);
  border-color:var(--border);
}
.pipeline-seg.current{
  border-width:2px;
  font-weight:600;
}
.pipeline-seg.current.ok{border-color:var(--accent-teal);color:var(--accent-teal);background:#16211F;}
.pipeline-seg.current.attention{border-color:var(--accent-amber);color:var(--accent-amber);background:#231F16;}
.pipeline-seg.current.bloque{border-color:var(--accent-coral);color:var(--accent-coral);background:#241816;}

.health-select{
  display:flex;
  gap:6px;
  margin-top:12px;
}
.health-btn{
  flex:1;
  padding:8px;
  border-radius:5px;
  border:1px solid var(--border);
  background:var(--surface-raised);
  color:var(--text-secondary);
  font-size:12px;
  cursor:pointer;
}
.health-btn.active.ok{background:var(--accent-teal);color:#0A1A18;border:none;}
.health-btn.active.attention{background:var(--accent-amber);color:#231A08;border:none;}
.health-btn.active.bloque{background:var(--accent-coral);color:#240D07;border:none;}

.info-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  margin-top:16px;
}
.info-block{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:6px;
  padding:14px;
}
.info-block-label{
  font-size:11px;
  color:var(--text-secondary);
  text-transform:uppercase;
  letter-spacing:0.06em;
  margin-bottom:8px;
}
.tag{
  display:inline-block;
  background:var(--surface-raised);
  border:1px solid var(--border);
  padding:3px 8px;
  border-radius:4px;
  font-size:12px;
  margin:2px 4px 2px 0;
}
textarea, input[type=text], input[type=date], select{
  width:100%;
  background:var(--surface-raised);
  border:1px solid var(--border);
  color:var(--text-primary);
  border-radius:5px;
  padding:8px 10px;
  font-family:'Inter',sans-serif;
  font-size:13px;
}
textarea{resize:vertical;min-height:70px;}
label{
  font-size:12px;
  color:var(--text-secondary);
  display:block;
  margin-bottom:4px;
  margin-top:12px;
}

/* --- Tabs --- */
.tabs{
  display:flex;
  gap:20px;
  border-bottom:1px solid var(--border);
  margin-bottom:18px;
}
.tab{
  padding:6px 0 10px;
  font-size:13px;
  color:var(--text-secondary);
  cursor:pointer;
  border-bottom:2px solid transparent;
}
.tab.active{
  color:var(--text-primary);
  font-weight:600;
  border-color:var(--accent-teal);
}

/* --- Finance --- */
.fin-cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-bottom:12px;
}
.fin-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:6px;
  padding:12px 14px;
}
.fin-card-label{
  font-size:10px;
  color:var(--text-secondary);
  text-transform:uppercase;
  letter-spacing:0.05em;
  margin-bottom:6px;
}
.fin-card-value{
  font-size:19px;
  font-weight:600;
  font-family:'Space Grotesk',sans-serif;
}
.progress-outer{
  background:var(--surface-raised);
  border-radius:4px;
  height:8px;
  overflow:hidden;
  margin-top:8px;
}
.progress-inner{
  background:var(--accent-teal);
  height:100%;
}
.month-select-row{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
}
.month-select-row select{width:auto;}
table.data-table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
  margin-top:8px;
}
table.data-table th{
  text-align:right;
  font-size:10px;
  color:var(--text-secondary) !important;
  text-transform:uppercase;
  letter-spacing:0.04em;
  padding:6px 8px;
  border-bottom:1px solid var(--border);
  background:transparent;
}
table.data-table th:first-child, table.data-table td:first-child{text-align:left;}
table.data-table td{
  padding:6px 8px;
  border-bottom:1px solid var(--border);
  text-align:right;
  font-size:13px;
  color:var(--text-primary) !important;
  background:transparent;
}
table.data-table tr{background:transparent;}
table.data-table tfoot td{
  font-weight:700;
  border-top:1px solid var(--accent-lavender);
  border-bottom:none;
  color:var(--text-primary) !important;
}
.import-hint{
  font-size:12px;
  color:var(--text-secondary);
  margin-top:6px;
  line-height:1.5;
}
.freelancer-chip{
  cursor:pointer;
}

/* --- Freelancers footer panel --- */
.freelancers-bar{
  border-top:1px solid var(--border);
  background:var(--surface);
  padding:14px 24px;
  display:flex;
  gap:10px;
  overflow-x:auto;
  align-items:center;
}
.freelancer-chip{
  background:var(--surface-raised);
  border:1px solid var(--border);
  border-radius:20px;
  padding:6px 12px;
  font-size:12px;
  display:flex;
  align-items:center;
  gap:8px;
  white-space:nowrap;
  flex-shrink:0;
}
.freelancer-load{
  background:var(--accent-lavender);
  color:#12161F;
  border-radius:10px;
  padding:1px 7px;
  font-size:11px;
  font-weight:600;
}

/* --- Modal --- */
.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:100;
}
.modal{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:8px;
  padding:24px;
  width:460px;
  max-height:85vh;
  overflow-y:auto;
}
.modal h3{margin-top:0;}
.modal-actions{
  display:flex;
  gap:8px;
  margin-top:20px;
  justify-content:flex-end;
}
.close-x{
  float:right;
  cursor:pointer;
  color:var(--text-secondary);
  font-size:18px;
}
.summary-text{
  white-space:pre-wrap;
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;
  line-height:1.6;
  background:var(--surface-raised);
  border:1px solid var(--border);
  border-radius:6px;
  padding:14px;
  max-height:340px;
  overflow-y:auto;
}
.loading-dots::after{
  content:'';
  animation:dots 1.2s infinite;
}
@keyframes dots{
  0%{content:'.'}
  33%{content:'..'}
  66%{content:'...'}
}
.field-row{display:flex;gap:10px;}
.field-row > div{flex:1;}
.freelancer-tjm-row{display:flex;align-items:center;gap:8px;margin-top:8px;}
.freelancer-tjm-row .fname{flex:1.4;font-size:13px;}
.freelancer-tjm-row select{flex:1;}
.freelancer-tjm-row input{flex:1;}
html, body{
  margin:0;
  padding:0;
  background:var(--bg);
  min-height:100vh;
}
</style>
</head>
<body>

<div id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const STAGES = ['Cadrage','Configuration','Développement','Tests','Recette','Go-live'];
// --- Adaptateur de stockage local (remplace window.storage de Claude) ---
// Cette page est hébergée en dehors de Claude : les données sont stockées
// dans le navigateur (localStorage), donc propres à cet appareil/navigateur.
// Utilisez les boutons Export/Import de l'outil pour transférer les données
// entre appareils ou navigateurs.
if(!window.storage){
  window.storage = {
    async get(key){
      try{
        const raw = localStorage.getItem(key);
        if(raw === null || raw === undefined) return null;
        return {key, value: raw, shared:false};
      }catch(e){
        console.error('storage.get error', e);
        return null;
      }
    },
    async set(key, value){
      try{
        localStorage.setItem(key, value);
        return {key, value, shared:false};
      }catch(e){
        console.error('storage.set error', e);
        return null;
      }
    },
    async delete(key){
      try{
        localStorage.removeItem(key);
        return {key, deleted:true, shared:false};
      }catch(e){
        console.error('storage.delete error', e);
        return null;
      }
    },
    async list(prefix){
      try{
        const keys = Object.keys(localStorage).filter(k => !prefix || k.startsWith(prefix));
        return {keys, prefix, shared:false};
      }catch(e){
        console.error('storage.list error', e);
        return null;
      }
    }
  };
}

const STORAGE_KEY = 'odoo-pilotage-data';
const HISTORY_STORAGE_KEY = 'odoo-pilotage-import-history';
const TODAY = '2026-07-10';
const CURRENT_MONTH = '2026-07';

let state = {
  projects: [],
  freelancers: [],
  knownOdooProjectNames: [],
  allImportedRows: [],
  selectedId: null,
  loaded: false,
  activeTab: 'finance',
  financeMonth: null,
  financeViewMode: 'periode',
  periodMode: 'mois',
  periodFrom: null,
  periodTo: null,
  viewMode: 'project',
  sidebarSearch: '',
  sidebarVisibleCount: 15,
  globalFinanceMonth: null,
  globalSubTab: 'monthly',
  globalMonthlyFilter: 'all',
  marginShowDetails: false,
  linesFilterMonth: 'all',
  linesFilterProject: 'all',
  linesFilterFreelancer: 'all',
  linesGroupBy: 'none'
};

let modal = null; // {type: 'project'|'freelancer'|'summary'|'import'|'importResult', data:{...}}

function uid(){ return Math.random().toString(36).slice(2,9); }

function seedData(){
  return {
    projects: [],
    freelancers: []
  };
}

async function loadData(){
  try{
    const res = await window.storage.get(STORAGE_KEY, false);
    if(res && res.value){
      const parsed = JSON.parse(res.value);
      state.projects = parsed.projects || [];
      state.freelancers = parsed.freelancers || [];
      state.knownOdooProjectNames = parsed.knownOdooProjectNames || [];
      migrateLoadedData();
      const derivedNames = new Set(state.knownOdooProjectNames || []);
      state.projects.forEach(p=>{
        (p.odooProjectName||'').split(/[,;]/).map(s=>s.trim()).filter(Boolean).forEach(f=> derivedNames.add(f));
      });
      state.knownOdooProjectNames = Array.from(derivedNames).sort();
    } else {
      const seed = seedData();
      state.projects = seed.projects;
      state.freelancers = seed.freelancers;
      await saveData();
    }
  }catch(e){
    const seed = seedData();
    state.projects = seed.projects;
    state.freelancers = seed.freelancers;
    try{ await saveData(); }catch(e2){ console.error('Save failed', e2); }
  }
  state.loaded = true;
  if(state.projects.length) state.selectedId = state.projects[0].id;

  try{
    const histRes = await window.storage.get(HISTORY_STORAGE_KEY, false);
    state.allImportedRows = (histRes && histRes.value) ? JSON.parse(histRes.value) : [];
  }catch(e){
    state.allImportedRows = [];
  }

  render();
}

async function saveData(){
  try{
    await window.storage.set(STORAGE_KEY, JSON.stringify({
      projects: state.projects,
      freelancers: state.freelancers,
      knownOdooProjectNames: state.knownOdooProjectNames
    }), false);
  }catch(e){
    console.error('Erreur de sauvegarde', e);
  }
}

function rowIdentityKey(row){
  const rawId = (row['ID']||'').toString().trim();
  return rawId || buildFallbackSourceId(row);
}

function mergeImportedRows(rows){
  const map = new Map();
  (state.allImportedRows||[]).forEach(r=> map.set(rowIdentityKey(r), r));
  rows.forEach(r=> map.set(rowIdentityKey(r), r));
  state.allImportedRows = Array.from(map.values());
}

async function saveImportHistory(){
  try{
    await window.storage.set(HISTORY_STORAGE_KEY, JSON.stringify(state.allImportedRows), false);
  }catch(e){
    console.error('Erreur de sauvegarde de l\u2019historique d\u2019import', e);
  }
}

function computeSuggestedTjm(salaireMensuel, heuresPresenceSemaine){
  if(!salaireMensuel || !heuresPresenceSemaine) return null;
  const joursParSemaine = heuresPresenceSemaine/7;
  const joursParMois = joursParSemaine * (52/12);
  if(!joursParMois) return null;
  return salaireMensuel/joursParMois;
}

function formatEUR(n){
  return new Intl.NumberFormat('fr-FR', {style:'currency', currency:'EUR', minimumFractionDigits:2, maximumFractionDigits:2}).format(n || 0);
}

function healthLabel(h){
  return {ok:'Sur les rails', attention:'À surveiller', bloque:'Bloqué'}[h];
}

function daysUntil(dateStr){
  const d = new Date(dateStr);
  const now = new Date(TODAY);
  return Math.round((d-now)/(1000*60*60*24));
}

function render(){
  const app = document.getElementById('app');
  if(!state.loaded){
    app.innerHTML = '<div class="empty-state" style="height:400px;">Chargement…</div>';
    return;
  }

  const kpiTotal = state.projects.length;
  const kpiBloque = state.projects.filter(p=>p.health==='bloque').length;
  const kpiAttention = state.projects.filter(p=>p.health==='attention').length;
  const kpiUrgent = state.projects.filter(p=>daysUntil(p.deadline) <= 7).length;

  app.innerHTML = `
    <div class="kpi-bar">
      <button class="kpi kpi-nav-btn ${state.viewMode==='globalFinance'?'active':''}" id="nav-global-finance">📊 Rentabilité globale</button>
      <div class="kpi"><div class="kpi-label">Projets actifs</div><div class="kpi-value">${kpiTotal}</div></div>
      <div class="kpi"><div class="kpi-label">Bloqués</div><div class="kpi-value coral">${kpiBloque}</div></div>
      <div class="kpi"><div class="kpi-label">À surveiller</div><div class="kpi-value amber">${kpiAttention}</div></div>
      <div class="kpi"><div class="kpi-label">Échéance &lt; 7j</div><div class="kpi-value teal">${kpiUrgent}</div></div>
    </div>
    <div class="main-layout">
      ${renderSidebar()}
      ${state.viewMode==='globalFinance' ? renderGlobalFinanceView() : renderMainPanel()}
    </div>
    ${renderFreelancersBar()}
  `;

  attachSidebarEvents();
  if(state.viewMode==='globalFinance'){
    attachGlobalFinanceEvents();
  } else {
    attachMainPanelEvents();
  }
  attachFreelancerEvents();

  if(modal) renderModal();
}

const BILLING_TYPE_META = {
  regie: {icon:'⚙️', color:'#8C8FA3'},
  budgetAnnuel: {icon:'📅', color:'#E3A548'},
  forfaitProjet: {icon:'📦', color:'#45B8AC'},
  maintenance: {icon:'🔧', color:'#E2725B'}
};

function migrateLoadedData(){
  state.projects.forEach(p=>{
    if(!p.timeEntries) p.timeEntries = [];
    if(p.tjmVendu===undefined) p.tjmVendu = 0;
    if(p.vendu===undefined) p.vendu = 0;
    if(p.pctProdRisque===undefined) p.pctProdRisque = 0;
    if(p.factureCumulee===undefined) p.factureCumulee = 0;
    if(p.avancementFeeling===undefined) p.avancementFeeling = 0;
    if(p.odooProjectName===undefined) p.odooProjectName = '';
    if(p.driveLink===undefined) p.driveLink = '';
    if(p.useCoef===undefined) p.useCoef = false;
    if(p.coefficients===undefined) p.coefficients = {};
    if(p.billingType===undefined) p.billingType = 'forfaitProjet';
    if(p.inheritFrom===undefined) p.inheritFrom = '';
    if(p.forfaits===undefined) p.forfaits = {};
    if(p.budgetAnnuelJours===undefined) p.budgetAnnuelJours = 0;
    if(p.odooTaskKeyword===undefined) p.odooTaskKeyword = '';
  });
  state.freelancers.forEach(f=>{
    if(f.tjmCout===undefined) f.tjmCout = 0;

    if(f.salaireMensuel===undefined) f.salaireMensuel = 0;
    if(f.heuresPresenceSemaine===undefined) f.heuresPresenceSemaine = 0;

}

function exportAllData(){
  const payload = {
    exportedAt: new Date().toISOString(),
    projects: state.projects,
    freelancers: state.freelancers,
    knownOdooProjectNames: state.knownOdooProjectNames,
    allImportedRows: state.allImportedRows
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `pilotage-odoo-sauvegarde-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function importAllDataFromFile(file){
  try{
    const text = await file.text();
    const payload = JSON.parse(text);
    if(!Array.isArray(payload.projects) || !Array.isArray(payload.freelancers)){
      showAlert('Ce fichier ne semble pas être une sauvegarde valide de cet outil.');
      return;
    }
    state.projects = payload.projects;
    state.freelancers = payload.freelancers;
    state.knownOdooProjectNames = payload.knownOdooProjectNames || [];
    state.allImportedRows = payload.allImportedRows || [];
    migrateLoadedData();
    await saveData();
    await saveImportHistory();
    state.selectedId = state.projects.length ? state.projects[0].id : null;
    state.viewMode = 'project';
    render();
    showAlert(`Sauvegarde importée : ${state.projects.length} projet(s), ${state.freelancers.length} collaborateur(s).`);
  }catch(e){
    console.error(e);
    showAlert('Erreur lors de la lecture du fichier : ' + e.message);
  }
}

function monthsFromEntries(p){
  const set = new Set((p.timeEntries||[]).map(e=>e.month));
  set.add(CURRENT_MONTH);
  return Array.from(set).sort();
}

function computeFinance(p){
  const tjmVendu = getEffectiveTjmVendu(p);
  const vendu = p.vendu || 0;
  const joursVendus = tjmVendu ? vendu/tjmVendu : 0;
  const pctProdRisque = p.pctProdRisque || 0;
  const nbJourProd = joursVendus * (pctProdRisque/100);

  const entries = p.timeEntries || [];
  const totalHeures = entries.reduce((s,e)=>s+e.heures,0);
  const totalJours = totalHeures/7;
  const restantJours = joursVendus - totalJours;
  const avancementTps = joursVendus ? (totalJours/joursVendus*100) : 0;

  const monthsWithData = Array.from(new Set(entries.map(e=>e.month)));
  const monthsSorted = monthsWithData.slice().sort();
  const premierMois = monthsSorted[0] || null;
  const dernierMois = monthsSorted[monthsSorted.length-1] || null;

  const entriesWithDate = entries.filter(e=>e.date);
  const datesSorted = entriesWithDate.map(e=>e.date).sort();
  const premierJour = datesSorted[0] || null;
  const dernierJour = datesSorted[datesSorted.length-1] || null;
  const nbSansDate = entries.length - entriesWithDate.length;
  const nbMoisAvecSaisie = monthsWithData.length || 1;
  const nbJourMoyParMois = totalJours / nbMoisAvecSaisie;
  const nbMoisRestant = nbJourMoyParMois > 0 ? restantJours/nbJourMoyParMois : null;

  const isMaintenance = p.billingType === 'maintenance';
  let facturationCumulee = 0, ssTraitanceCumulee = 0;
  entries.forEach(e=>{
    const jours = e.heures/7;
    const fl = state.freelancers.find(f=>f.name===e.freelancer);
    const cout = (fl && fl.type!=='interne') ? (fl.tjmCout||0) : 0;
    ssTraitanceCumulee += jours*cout;
    if(!isMaintenance){
      const coef = getEffectiveCoefficient(p, e.freelancer, e.month);
      facturationCumulee += jours*coef*tjmVendu;
    }
  });
  if(isMaintenance && monthsWithData.length){
    const sorted = monthsWithData.slice().sort();
    facturationCumulee = monthsBetween(sorted[0], sorted[sorted.length-1]).reduce((s,m)=> s + getForfaitMensuel(p, m), 0);
  }
  const margeCumulee = facturationCumulee - ssTraitanceCumulee;

  const currentYear = CURRENT_MONTH.slice(0,4);
  const joursAnnee = entries.filter(e=>e.month.slice(0,4)===currentYear).reduce((s,e)=>s+e.heures,0)/7;
  const budgetAnnuelJours = p.budgetAnnuelJours || 0;
  const restantAnnee = budgetAnnuelJours - joursAnnee;

  return {tjmVendu, vendu, joursVendus, pctProdRisque, nbJourProd,
    totalHeures, totalJours, restantJours, avancementTps,
    nbMoisRestant, nbJourMoyParMois,
    facturationCumulee, ssTraitanceCumulee, margeCumulee,
    joursAnnee, budgetAnnuelJours, restantAnnee,
    premierMois, dernierMois, premierJour, dernierJour, nbSansDate};
}

function getReferenceProject(p){
  if(!p.inheritFrom) return null;
  return state.projects.find(pr=>pr.id===p.inheritFrom) || null;
}

function getEffectiveTjmVendu(p){
  const ref = getReferenceProject(p);
  return ref ? (ref.tjmVendu||0) : (p.tjmVendu||0);
}

function getEffectiveCoefficient(p, freelancerName, month){
  const ref = getReferenceProject(p);
  return getCoefficient(ref || p, freelancerName, month);
}

function getForfaitMensuel(project, month){
  const co = project.forfaits || {};
  const applicableMonths = Object.keys(co).filter(m => m <= month).sort();
  if(!applicableMonths.length) return 0;
  const val = co[applicableMonths[applicableMonths.length-1]];
  return (typeof val === 'number' && val >= 0) ? val : 0;
}

function setForfaitMensuel(project, month, value){
  if(!project.forfaits) project.forfaits = {};
  project.forfaits[month] = value;
}

function monthsBetween(fromMonth, toMonth){
  const months = [];
  let cur = fromMonth;
  let guard = 0;
  while(cur <= toMonth && guard < 240){
    months.push(cur);
    cur = shiftMonth(cur, 1);
    guard++;
  }
  return months;
}

function getCoefficient(project, freelancerName, month){
  const co = (project.coefficients && project.coefficients[freelancerName]) || {};
  const applicableMonths = Object.keys(co).filter(m => m <= month).sort();
  if(!applicableMonths.length) return 1;
  const val = co[applicableMonths[applicableMonths.length-1]];
  return (typeof val === 'number' && val > 0) ? val : 1;
}

function setCoefficient(project, freelancerName, month, value){
  if(!project.coefficients) project.coefficients = {};
  if(!project.coefficients[freelancerName]) project.coefficients[freelancerName] = {};
  project.coefficients[freelancerName][month] = value;
}

function computeRangeBreakdown(p, fromMonth, toMonth){
  const entries = (p.timeEntries||[]).filter(e=> e.month >= fromMonth && e.month <= toMonth);
  const byFreelancer = {};
  entries.forEach(e=>{
    if(!byFreelancer[e.freelancer]) byFreelancer[e.freelancer] = {heures:0, joursFacturables:0};
    const coef = getEffectiveCoefficient(p, e.freelancer, e.month);
    byFreelancer[e.freelancer].heures += e.heures;
    byFreelancer[e.freelancer].joursFacturables += (e.heures/7) * coef;
  });
  const tjmVendu = getEffectiveTjmVendu(p);
  const isMaintenance = p.billingType === 'maintenance';
  const rows = Object.keys(byFreelancer).map(name=>{
    const heures = byFreelancer[name].heures;
    const jours = heures/7;
    const joursFacturables = byFreelancer[name].joursFacturables;
    const coefMoyen = jours ? Math.round((joursFacturables/jours)*10000)/10000 : 1;
    const fl = state.freelancers.find(f=>f.name===name);
    const facturation = isMaintenance ? null : joursFacturables*tjmVendu;
    const cout = (fl && fl.type!=='interne') ? (fl.tjmCout||0) : 0;
    const ssTraitance = jours*cout;
    const marge = isMaintenance ? null : (facturation - ssTraitance);
    const margePct = (!isMaintenance && facturation) ? (marge/facturation*100) : 0;
    return {name, heures, jours, joursFacturables, coefMoyen, facturation, ssTraitance, marge, margePct};
  });
  const totals = rows.reduce((acc,r)=>{
    acc.heures+=r.heures; acc.jours+=r.jours; acc.joursFacturables+=r.joursFacturables;
    acc.ssTraitance+=r.ssTraitance;
    if(!isMaintenance){ acc.facturation+=r.facturation; acc.marge+=r.marge; }
    return acc;
  }, {heures:0,jours:0,joursFacturables:0,facturation:0,ssTraitance:0,marge:0});

  if(isMaintenance){
    totals.facturation = monthsBetween(fromMonth, toMonth).reduce((s,m)=> s + getForfaitMensuel(p, m), 0);
    totals.marge = totals.facturation - totals.ssTraitance;
  }
  totals.margePct = totals.facturation ? (totals.marge/totals.facturation*100) : 0;
  return {rows, totals};
}

function shiftMonth(monthStr, delta){
  const [y,m] = monthStr.split('-').map(Number);
  const d = new Date(y, (m-1)+delta, 1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

function pickDefaultMonth(p){
  const months = new Set((p.timeEntries||[]).map(e=>e.month));
  if(months.has(CURRENT_MONTH)) return CURRENT_MONTH;
  const prevMonth = shiftMonth(CURRENT_MONTH, -1);
  if(months.has(prevMonth)) return prevMonth;
  return null;
}

function pickGlobalDefaultMonth(){
  const allMonths = new Set();
  state.projects.forEach(p=> (p.timeEntries||[]).forEach(e=> allMonths.add(e.month)));
  if(allMonths.has(CURRENT_MONTH)) return CURRENT_MONTH;
  const prev = shiftMonth(CURRENT_MONTH, -1);
  if(allMonths.has(prev)) return prev;
  const sorted = Array.from(allMonths).sort();
  return sorted.length ? sorted[sorted.length-1] : CURRENT_MONTH;
}

function normalizeName(name){
  return (name||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
}

function isSebastienName(name){
  return normalizeName(name).includes('sebastien');
}

function monthMatches(entryMonth, filterMonth){
  return filterMonth==='all' || entryMonth===filterMonth;
}

function forfaitForPeriod(project, month){
  if(month!=='all') return getForfaitMensuel(project, month);
  const months = Array.from(new Set((project.timeEntries||[]).map(e=>e.month))).sort();
  if(!months.length) return 0;
  return monthsBetween(months[0], months[months.length-1]).reduce((s,m)=> s + getForfaitMensuel(project, m), 0);
}

function isSebastienOnlyProject(project, month){
  const names = new Set((project.timeEntries||[]).filter(e=>monthMatches(e.month, month)).map(e=>e.freelancer));
  if(names.size !== 1) return false;
  return isSebastienName(Array.from(names)[0]);
}

function computeGlobalMonthData(month, excludeSebastienOnly){
  let totalHeures = 0, internalHeures = 0, externalHeures = 0;
  const byFreelancer = {};
  const byProject = {};
  state.projects.forEach(p=>{
    if(excludeSebastienOnly && isSebastienOnlyProject(p, month)) return;
    let hasEntriesThisMonth = false;
    (p.timeEntries||[]).forEach(e=>{
      if(!monthMatches(e.month, month)) return;
      hasEntriesThisMonth = true;
      totalHeures += e.heures;
      const fl = state.freelancers.find(f=>f.name===e.freelancer);
      const type = fl ? fl.type : 'externe';
      if(type==='interne'){ internalHeures += e.heures; } else { externalHeures += e.heures; }
      if(!byFreelancer[e.freelancer]) byFreelancer[e.freelancer] = {heures:0, type, tjmCout: fl?(fl.tjmCout||0):0};
      byFreelancer[e.freelancer].heures += e.heures;
      if(!byProject[p.id]) byProject[p.id] = {client:p.client, ref:p.ref, heures:0, joursFacturables:0, tjmVendu:getEffectiveTjmVendu(p), montantOverride:null};
      byProject[p.id].heures += e.heures;
      const coef = getEffectiveCoefficient(p, e.freelancer, e.month);
      byProject[p.id].joursFacturables += (e.heures/7) * coef;
    });
    if(p.billingType==='maintenance' && (hasEntriesThisMonth || forfaitForPeriod(p, month))){
      if(!byProject[p.id]) byProject[p.id] = {client:p.client, ref:p.ref, heures:0, joursFacturables:0, tjmVendu:0, montantOverride:null};
      byProject[p.id].montantOverride = forfaitForPeriod(p, month);
    }
  });
  return {totalHeures, internalHeures, externalHeures, byFreelancer, byProject};
}

function ensureGlobalMonth(){
  const allMonthsSet = new Set([CURRENT_MONTH]);
  state.projects.forEach(p=> (p.timeEntries||[]).forEach(e=> allMonthsSet.add(e.month)));
  const allMonths = Array.from(allMonthsSet).sort();
  if(!state.globalFinanceMonth || (state.globalFinanceMonth!=='all' && !allMonths.includes(state.globalFinanceMonth))){
    state.globalFinanceMonth = pickGlobalDefaultMonth();
  }
  return allMonths;
}

function collectAllEntries(){
  const list = [];
  state.projects.forEach(p=>{
    (p.timeEntries||[]).forEach(e=>{
      list.push({
        entryId:e.id, projectId:p.id, projectClient:p.client, projectRef:p.ref,
        freelancer:e.freelancer, month:e.month, heures:e.heures, sourceId:e.sourceId
      });
    });
  });
  return list;
}

function heuresToHHMM(heures){
  const totalMinutes = Math.round((heures||0) * 60);
  const h = Math.floor(totalMinutes / 60);
  const m = totalMinutes % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

function sourceLabel(sourceId){
  if(!sourceId) return 'Saisie manuelle';
  if(sourceId.toString().startsWith('fb:')) return 'Import (sans ID)';
  return 'Import Odoo';
}

function getFilteredEntries(){
  const all = collectAllEntries();
  const months = Array.from(new Set(all.map(e=>e.month))).sort();
  const freelancerNames = Array.from(new Set(all.map(e=>e.freelancer))).sort();

  if(!months.includes(state.linesFilterMonth)) state.linesFilterMonth = 'all';
  if(!state.projects.some(p=>p.id===state.linesFilterProject)) state.linesFilterProject = 'all';
  if(!freelancerNames.includes(state.linesFilterFreelancer)) state.linesFilterFreelancer = 'all';

  const filtered = all.filter(e=>
    (state.linesFilterMonth==='all' || e.month===state.linesFilterMonth) &&
    (state.linesFilterProject==='all' || e.projectId===state.linesFilterProject) &&
    (state.linesFilterFreelancer==='all' || e.freelancer===state.linesFilterFreelancer)
  ).sort((a,b)=> (b.month.localeCompare(a.month)) || a.projectClient.localeCompare(b.projectClient) || a.freelancer.localeCompare(b.freelancer));

  return {all, months, freelancerNames, filtered};
}

function groupFilteredEntries(filtered, groupBy){
  const groups = {};
  filtered.forEach(e=>{
    let key, label;
    if(groupBy==='project'){ key = e.projectId; label = e.projectClient; }
    else if(groupBy==='freelancer'){ key = e.freelancer; label = e.freelancer; }
    else { key = e.month; label = e.month; }
    if(!groups[key]) groups[key] = {key, label, heures:0, count:0, items:[]};
    groups[key].heures += e.heures;
    groups[key].count += 1;
    groups[key].items.push({projectId:e.projectId, entryId:e.entryId});
  });
  return Object.values(groups).sort((a,b)=> b.heures-a.heures);
}

function computeSubcontractorBreakdown(month){
  const result = {};
  state.projects.forEach(p=>{
    (p.timeEntries||[]).forEach(e=>{
      if(!monthMatches(e.month, month)) return;
      const fl = state.freelancers.find(f=>f.name===e.freelancer);
      const type = fl ? fl.type : 'externe';
      if(!result[e.freelancer]) result[e.freelancer] = {name:e.freelancer, type, tjmCout: fl?(fl.tjmCout||0):0, projects:{}};
      const r = result[e.freelancer];
      if(!r.projects[p.id]) r.projects[p.id] = {client:p.client, ref:p.ref, tjmVendu: p.billingType==='maintenance' ? 0 : getEffectiveTjmVendu(p), heures:0, joursFacturables:0};
      r.projects[p.id].heures += e.heures;
      const coef = getEffectiveCoefficient(p, e.freelancer, e.month);
      r.projects[p.id].joursFacturables += (e.heures/7) * coef;
    });
  });
  return Object.values(result).map(r=>{
    const projectsList = Object.values(r.projects).map(pr=>{
      const jours = pr.heures/7;
      const joursFacturables = pr.joursFacturables;
      const coef = jours ? Math.round((joursFacturables/jours)*10000)/10000 : 1;
      const montantSousTraitant = jours * r.tjmCout;
      const montantFacture = pr.tjmVendu ? joursFacturables * pr.tjmVendu : 0;
      const marge = montantFacture - montantSousTraitant;
      return {...pr, jours, joursFacturables, coef, montantSousTraitant, montantFacture, marge};
    }).sort((a,b)=> b.heures-a.heures);
    const totalHeures = projectsList.reduce((s,x)=>s+x.heures,0);
    const totalMontant = projectsList.reduce((s,x)=>s+x.montantSousTraitant,0);
    const totalFacture = projectsList.reduce((s,x)=>s+x.montantFacture,0);
    return {name:r.name, type:r.type, tjmCout:r.tjmCout, projectsList, totalHeures, totalMontant, totalFacture, totalMarge: totalFacture-totalMontant};
  }).sort((a,b)=> b.totalMontant-a.totalMontant);
}

function computeProjectMarginBreakdown(month, excludeSebastienOnly){
  return state.projects.filter(p=> !(excludeSebastienOnly && isSebastienOnlyProject(p, month))).map(p=>{
    const entries = (p.timeEntries||[]).filter(e=>monthMatches(e.month, month));
    const byFreelancer = {};
    entries.forEach(e=>{
      if(!byFreelancer[e.freelancer]) byFreelancer[e.freelancer] = {heures:0, joursFacturables:0};
      byFreelancer[e.freelancer].heures += e.heures;
      byFreelancer[e.freelancer].joursFacturables += (e.heures/7) * getEffectiveCoefficient(p, e.freelancer, e.month);
    });
    const isMaintenance = p.billingType === 'maintenance';
    const tjmVendu = getEffectiveTjmVendu(p);
    const freelancerDetails = Object.keys(byFreelancer).map(name=>{
      const heures = byFreelancer[name].heures;
      const jours = heures/7;
      const joursFacturables = byFreelancer[name].joursFacturables;
      const coef = jours ? Math.round((joursFacturables/jours)*10000)/10000 : 1;
      const fl = state.freelancers.find(f=>f.name===name);
      const type = fl ? fl.type : 'externe';
      const tjmCout = (type!=='interne') ? (fl?(fl.tjmCout||0):0) : 0;
      const montant = jours*tjmCout;
      return {name, heures, jours, coef, joursFacturables, tjmCout, montant, type};
    });
    const totalHeures = entries.reduce((s,e)=>s+e.heures,0);
    const totalJours = totalHeures/7;
    const totalJoursFacturables = freelancerDetails.reduce((s,f)=>s+f.joursFacturables,0);
    const totalCout = freelancerDetails.reduce((s,f)=>s+f.montant,0);
    const montantFacture = isMaintenance ? forfaitForPeriod(p, month) : (tjmVendu ? totalJoursFacturables*tjmVendu : 0);
    const hasActivity = totalHeures>0 || (isMaintenance && montantFacture>0);
    return {
      client:p.client, ref:p.ref, tjmVendu, useCoef:p.useCoef, billingType:p.billingType, isMaintenance, hasActivity,
      totalHeures, totalJours, totalJoursFacturables, montantFacture, totalCout,
      marge: montantFacture - totalCout, freelancerDetails
    };
  }).filter(r=> r.hasActivity).sort((a,b)=> b.marge-a.marge);
}

    render();
  });

    state.marginShowDetails = marginDetailsChk.checked;
    render();
  });

  document.querySelectorAll('.btn-save-tjm').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const name = decodeURIComponent(btn.dataset.name);
      const input = document.querySelector(`.f-inline-tjm[data-name="${btn.dataset.name}"]`);
      const tjmCout = parseFloat((input.value||'0').replace(',','.')) || 0;
      let fl = state.freelancers.find(f=>f.name===name);
      if(!fl){
        fl = {id:uid(), name, specialite:'', tjmCout:0, type:'externe'};
        state.freelancers.push(fl);
      }
      fl.tjmCout = tjmCout;
      await saveData();
      render();
    });
  });

  const clearAllBtn = document.getElementById('btn-clear-all-projects');
  if(clearAllBtn) clearAllBtn.addEventListener('click', ()=>{
    const totalEntries = state.projects.reduce((s,p)=> s + (p.timeEntries||[]).length, 0);
    if(!totalEntries){ showAlert('Aucune saisie de temps à effacer.'); return; }
    showConfirm(`Effacer les saisies de temps de TOUS les projets (${totalEntries} au total) ? Les paramètres des projets (TJM, échéances, notes, etc.) ne seront pas touchés.`, async ()=>{
      state.projects.forEach(p=>{ p.timeEntries = []; });

      state.globalFinanceMonth = null;
      await saveData();
      render();
    });

  const lf1 = document.getElementById('f-lines-month');

  if(lfGroup) lfGroup.addEventListener('change', ()=>{ state.linesGroupBy = lfGroup.value; render(); });

    showConfirm(`Supprimer ces ${filtered.length} ligne(s) de temps ? Cette action ne touche que les saisies affichées avec les filtres actuels.`, async ()=>{
      const byProject = {};
      filtered.forEach(e=>{
        if(!byProject[e.projectId]) byProject[e.projectId] = new Set();
        byProject[e.projectId].add(e.entryId);
      });
      Object.keys(byProject).forEach(projectId=>{
        const p = state.projects.find(pr=>pr.id===projectId);
        if(p){ p.timeEntries = (p.timeEntries||[]).filter(e=> !byProject[projectId].has(e.id)); }

      const projectId = btn.dataset.project;
      const entryId = btn.dataset.entry;
      showConfirm('Supprimer cette ligne de temps ?', async ()=>{
        const p = state.projects.find(pr=>pr.id===projectId);
        if(p){ p.timeEntries = (p.timeEntries||[]).filter(e=>e.id!==entryId); }
        await saveData();
        render();
      });
    });
  });

  document.querySelectorAll('.btn-delete-group').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const key = decodeURIComponent(btn.dataset.key);
      const {filtered} = getFilteredEntries();
      const groups = groupFilteredEntries(filtered, state.linesGroupBy);
      const group = groups.find(g=> g.key.toString()===key);

        const byProject = {};
        group.items.forEach(it=>{
          if(!byProject[it.projectId]) byProject[it.projectId] = new Set();
          byProject[it.projectId].add(it.entryId);
        });
        Object.keys(byProject).forEach(projectId=>{
          const p = state.projects.find(pr=>pr.id===projectId);
          if(p){ p.timeEntries = (p.timeEntries||[]).filter(e=> !byProject[projectId].has(e.id)); }
        });
        await saveData();
        render();
      });
    });
  });
}

function cleanEmployeeName(raw){
  return (raw||'').toString().replace(/^\[E\]\s*/,'').replace(/\s*\(User\)$/,'').trim();
}

function decodeExcelDate(dateVal){
  if(typeof dateVal === 'number' && isFinite(dateVal)){
    try{
      const dec = XLSX.SSF.parse_date_code(dateVal);
      if(dec) return {y:dec.y, m:dec.m, d:dec.d};
    }catch(e){ /* fall through */ }
    return null;
  }
  if(dateVal instanceof Date && !isNaN(dateVal)){
    return {y:dateVal.getUTCFullYear(), m:dateVal.getUTCMonth()+1, d:dateVal.getUTCDate()};
  }
  if(typeof dateVal === 'string'){
    const m1 = dateVal.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if(m1) return {y:parseInt(m1[1]), m:parseInt(m1[2]), d:parseInt(m1[3])};
    const m2 = dateVal.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
    if(m2) return {y:parseInt(m2[3]), m:parseInt(m2[2]), d:parseInt(m2[1])};
  }
  return null;
}

function dateToMonth(dateVal){
  const dec = decodeExcelDate(dateVal);
  if(!dec) return null;
  return `${dec.y}-${String(dec.m).padStart(2,'0')}`;
}

function buildFallbackSourceId(row){
  const dec = decodeExcelDate(row['Date']);
  const dateKey = dec ? `${dec.y}-${String(dec.m).padStart(2,'0')}-${String(dec.d).padStart(2,'0')}` : (row['Date']||'').toString();
  const parts = [
    dateKey,
    (row['Employé']||'').toString().trim(),
    (row['Projet']||'').toString().trim(),
    (row['Tâche']||'').toString().trim(),
    (row["Ticket d'assistance"]||'').toString().trim(),
    (row['Description']||'').toString().trim(),
    (row['Quantité']||'').toString().trim()
  ];
  return 'fb:' + parts.join('|');
}

function rowMatchesKeyword(row, keyword){
  const kw = (keyword||'').trim().toLowerCase();
  if(!kw) return true;
  const text = ((row['Tâche']||'') + ' ' + (row["Ticket d'assistance"]||'') + ' ' + (row['Description']||'')).toString().toLowerCase();
  return text.includes(kw);
}

function recordKnownOdooProjectNames(rows){
  const set = new Set(state.knownOdooProjectNames || []);
  rows.forEach(r=>{
    const v = (r['Projet']||'').toString().trim();
    if(v) set.add(v);
  });
  state.knownOdooProjectNames = Array.from(set).sort();
}

function getOdooFragments(project){
  return (project.odooProjectName||'').split(/[,;]/).map(s=>s.trim().toLowerCase()).filter(Boolean);
}

function projectMatchesRow(project, row){
  const projet = (row['Projet']||'').toString().trim().toLowerCase();
  const fragments = getOdooFragments(project);
  if(!fragments.length || !fragments.some(f=> projet.includes(f))) return false;
  if(project.odooTaskKeyword){
    return rowMatchesKeyword(row, project.odooTaskKeyword);
  }
  const siblingsWithKeyword = state.projects.filter(p2=> p2.id!==project.id && p2.odooTaskKeyword);
  for(const sib of siblingsWithKeyword){
    const sibFragments = getOdooFragments(sib);
    if(sibFragments.some(f=> projet.includes(f)) && rowMatchesKeyword(row, sib.odooTaskKeyword)) return false;
  }
  return true;
}

function decodeExcelDateToISO(dateVal){
  const dec = decodeExcelDate(dateVal);
  if(!dec) return null;
  return `${dec.y}-${String(dec.m).padStart(2,'0')}-${String(dec.d).padStart(2,'0')}`;
}

function processOdooRows(rows, project){
  const newEntries = [];
  const freelancerTypes = {};
  let skippedDup = 0, skippedProject = 0, skippedInvalid = 0;
  const rowSourceIds = new Set();
  rows.forEach(row=>{
    const rawIdEarly = (row['ID']||'').toString().trim();
    const sourceIdEarly = rawIdEarly || buildFallbackSourceId(row);
    rowSourceIds.add(sourceIdEarly);
    if(!projectMatchesRow(project, row)){ skippedProject++; return; }
    const rawEmp = (row['Employé']||'').toString();
    const isExternal = /^\[E\]/.test(rawEmp.trim());
    const emp = cleanEmployeeName(rawEmp);
    if(emp) freelancerTypes[emp] = isExternal ? 'externe' : 'interne';
    const sourceId = sourceIdEarly;
    if((project.timeEntries||[]).some(e=>e.sourceId===sourceId)){ skippedDup++; return; }
    const month = dateToMonth(row['Date']);
    const exactDate = decodeExcelDateToISO(row['Date']);
    const heures = parseFloat(row['Quantité']);
    if(!month || !emp || isNaN(heures) || heures<=0){ skippedInvalid++; return; }
    newEntries.push({id:uid(), sourceId, freelancer:emp, heures, month, date:exactDate});
  });

  const reclassifiedEntryIds = [];
  (project.timeEntries||[]).forEach(e=>{
    if(!e.sourceId || !rowSourceIds.has(e.sourceId)) return;
    const matchingRow = rows.find(r=>{
      const rid = (r['ID']||'').toString().trim();
      return (rid || buildFallbackSourceId(r)) === e.sourceId;
    });
    if(matchingRow && !projectMatchesRow(project, matchingRow)){
      reclassifiedEntryIds.push(e.id);
    }
  });

  return {newEntries, skippedDup, skippedProject, skippedInvalid, freelancerTypes, reclassifiedEntryIds};
}

function defaultDeadlinePlus(days){

function computeUnmatchedCount(rows){
  let unmatched = 0;
  rows.forEach(row=>{
    const projet = (row['Projet']||'').toString().trim().toLowerCase();
    if(!projet){ return; }
    const matchesAny = state.projects.some(p=> getOdooFragments(p).some(f=> projet.includes(f)));
    if(!matchesAny) unmatched++;
  });
  return unmatched;
}

function importGlobalRows(rows){
  const report = [];
  state.projects.forEach(p=>{
    if(!p.odooProjectName){
      report.push({client:p.client, ref:p.ref, imported:0, noConfig:true});
      return;
    }
    const {newEntries, skippedDup, skippedInvalid, freelancerTypes, reclassifiedEntryIds} = processOdooRows(rows, p);
    newEntries.forEach(e=>{
      if(!state.freelancers.find(f=>f.name===e.freelancer)){
        const type = freelancerTypes[e.freelancer] || 'externe';
        state.freelancers.push({id:uid(), name:e.freelancer, specialite:'', tjmCout:0, type});
      }
    });
    if(reclassifiedEntryIds.length){
      p.timeEntries = (p.timeEntries||[]).filter(e=> !reclassifiedEntryIds.includes(e.id));
    }
    p.timeEntries = (p.timeEntries||[]).concat(newEntries);
    report.push({client:p.client, ref:p.ref, imported:newEntries.length, skippedDup, skippedInvalid, reclassified:reclassifiedEntryIds.length});
  });
  return report;
}

function parseOdooImport(text){
  const lines = text.split('\n').map(l=>l.trim()).filter(Boolean);
  let entries = [];
  let skipped = 0;
  lines.forEach(line=>{
    let sep = '\t';
    if(line.indexOf('\t')===-1){
      sep = line.indexOf(';')!==-1 ? ';' : ',';
    }
    const parts = line.split(sep).map(s=>s.trim());
    if(parts.length < 3){ skipped++; return; }
    const name = parts[0];
    const heuresRaw = parts[1].replace(',', '.');
    const heures = parseFloat(heuresRaw);
    let mois = parts[2];
    if(!/^\d{4}-\d{2}$/.test(mois)){
      const altMY = mois.match(/^(\d{2})\/(\d{4})$/);
      const altDMY = mois.match(/^\d{1,2}\/(\d{2})\/(\d{4})$/);
      if(altMY) mois = `${altMY[2]}-${altMY[1]}`;
      else if(altDMY) mois = `${altDMY[2]}-${altDMY[1]}`;
    }
    if(isNaN(heures) || !/^\d{4}-\d{2}$/.test(mois) || !name){ skipped++; return; }
    entries.push({id: uid(), freelancer:name, heures, month:mois});
  });
  return {entries, skipped};
}

  if(!p) return '';
  const names = Array.from(new Set((p.timeEntries||[]).map(e=>e.freelancer)));
  if(!names.length) return '';

    const f = state.freelancers.find(fl=>fl.name===name) || {tjmCout:0, type:'externe'};
    const nameKey = encodeURIComponent(name);
    return `
      <div class="freelancer-tjm-row">
        <div class="fname">${name}</div>
        <select class="f-tjm-type" data-name="${nameKey}">
          <option value="externe" ${f.type!=='interne'?'selected':''}>Externe</option>
          <option value="interne" ${f.type==='interne'?'selected':''}>Interne</option>
        </select>
        <input type="text" class="f-tjm-cout" data-name="${nameKey}" value="${f.tjmCout||''}" placeholder="TJM €/j">

    `;
  }).join('');
  return `

    ${rows}
  `;
}

function autoFetchFromLastImport(project){
  if(!state.allImportedRows || !state.allImportedRows.length || !project.odooProjectName) return {imported:0, reclassified:0};
  const {newEntries, freelancerTypes, reclassifiedEntryIds} = processOdooRows(state.allImportedRows, project);
  newEntries.forEach(e=>{
    if(!state.freelancers.find(f=>f.name===e.freelancer)){
      const type = freelancerTypes[e.freelancer] || 'externe';
      state.freelancers.push({id:uid(), name:e.freelancer, specialite:'', tjmCout:0, type});
    }
  });
  if(reclassifiedEntryIds && reclassifiedEntryIds.length){
    project.timeEntries = (project.timeEntries||[]).filter(e=> !reclassifiedEntryIds.includes(e.id));
  }
  project.timeEntries = (project.timeEntries||[]).concat(newEntries);
  return {imported:newEntries.length, reclassified:(reclassifiedEntryIds||[]).length};
}

        <div class="modal-actions">
          <button class="btn" id="modal-cancel">Annuler l'import</button>
          <button class="btn btn-primary" id="modal-continue">Continuer l'import</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);

    function syncItemsFromDOM(){
      document.querySelectorAll('.review-check').forEach(chk=>{
        modal.data.items[parseInt(chk.dataset.index)].checked = chk.checked;
      });
    }

    document.getElementById('modal-close').onclick = closeModal;
    document.getElementById('modal-cancel').onclick = closeModal;

    document.getElementById('btn-apply-group').onclick = ()=>{
      syncItemsFromDOM();
      const kwInput = document.getElementById('f-group-keyword');
      const keyword = kwInput.value.trim();
      if(!keyword) return;
      const kwLower = keyword.toLowerCase();
      const matched = modal.data.items.filter(it=> it.names.some(n=>n.toLowerCase().includes(kwLower)));
      if(!matched.length){ showAlert('Aucun projet ne correspond à ce mot-clé.'); return; }
      const remaining = modal.data.items.filter(it=> !it.names.some(n=>n.toLowerCase().includes(kwLower)));
      const combinedNames = Array.from(new Set(matched.flatMap(it=>it.names)));
      remaining.push({
        label: `${keyword} (${combinedNames.length} variante(s) Odoo regroupée(s))`,
        names: combinedNames,
        checked: true,
        keyword: keyword
      });
      modal.data.items = remaining;
      render();
    };

    document.getElementById('modal-continue').onclick = async ()=>{
      syncItemsFromDOM();
      modal.data.items.forEach(it=>{
        if(it.checked){
          if(it.keyword){
            createProjectFromOdooName(it.keyword, it.keyword);
          } else {
            createProjectFromOdooName(it.names[0]);
          }
        }
      });
      const rows = modal.data.rows;
      const report = importGlobalRows(rows);
      const unmatched = computeUnmatchedCount(rows);
      await saveData();
      modal = {type:'importGlobalResult', data:{report, unmatched}};
      render();
    };
  }

  if(modal.type === 'importGlobalResult'){
    const {report, unmatched} = modal.data;
    const rowsHtml = report.map(r=>{
      if(r.noConfig){
        return `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);"><span>${r.client}</span><span style="color:var(--text-secondary);font-size:12px;">Projet Odoo non renseigné</span></div>`;
      }
      let detail = [];
      if(r.skippedDup) detail.push(`${r.skippedDup} déjà importée(s)`);
      if(r.skippedInvalid) detail.push(`${r.skippedInvalid} invalide(s)`);
      if(r.reclassified) detail.push(`${r.reclassified} reclassée(s) vers un sous-projet`);
      return `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);"><span>${r.client}</span><span class="mono">${r.imported} ligne(s)${detail.length ? ' · '+detail.join(', ') : ''}</span></div>`;
    }).join('');
    overlay.innerHTML = `
      <div class="modal" style="width:480px;">
        <span class="close-x" id="modal-close">&times;</span>
        <h3>Import terminé</h3>
        <div style="margin-top:10px;">${rowsHtml}</div>
        ${unmatched ? `<p class="import-hint">${unmatched} ligne(s) du fichier ne correspondent à aucun projet configuré (vérifiez le champ "Nom du projet dans Odoo" sur vos fiches, ou il s'agit de temps hors projets clients).</p>` : ''}
        <div class="modal-actions">
          <button class="btn btn-primary" id="modal-cancel">Fermer</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    document.getElementById('modal-close').onclick = closeModal;
    document.getElementById('modal-cancel').onclick = closeModal;
  }

  if(modal.type === 'importResult'){
    const {imported, skipped, skippedProject, skippedInvalid, reclassified} = modal.data;
    let detail = [];
    if(skipped) detail.push(`${skipped} déjà importée(s)`);
    if(skippedProject) detail.push(`${skippedProject} hors projet Odoo indiqué`);
    if(skippedInvalid) detail.push(`${skippedInvalid} format invalide`);
    overlay.innerHTML = `
      <div class="modal" style="width:420px;">
        <span class="close-x" id="modal-close">&times;</span>
        <h3>Import terminé</h3>
        <p>${imported} ligne(s) importée(s)${detail.length ? ', ' + detail.join(', ') + ' ignorée(s)' : ''}.</p>
        ${reclassified ? `<p class="import-hint">${reclassified} ligne(s) déjà présente(s) ici ont été retirée(s) car elles correspondent maintenant à un sous-projet (mot-clé) — vérifiez que ce sous-projet a bien été importé aussi.</p>` : ''}
        ${imported ? '<p class="import-hint">Pensez à vérifier le TJM coût des nouveaux indépendants ajoutés automatiquement (barre du bas, cliquez sur leur nom).</p>' : ''}
        <div class="modal-actions">
          <button class="btn btn-primary" id="modal-cancel">Fermer</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    document.getElementById('modal-close').onclick = closeModal;
    document.getElementById('modal-cancel').onclick = closeModal;
  }

  if(modal.type === 'summary'){
    overlay.innerHTML = `
      <div class="modal" style="width:560px;">
        <span class="close-x" id="modal-close">&times;</span>
        <h3>Synthèse hebdomadaire</h3>
        <div id="summary-content">
          ${modal.loading ? '<p style="color:var(--text-secondary);">Génération en cours<span class="loading-dots"></span></p>' : `<div class="summary-text">${modal.data || ''}</div>`}
        </div>
        <div class="modal-actions">
          ${!modal.loading && modal.data ? '<button class="btn" id="modal-copy">Copier</button>' : ''}
          <button class="btn btn-primary" id="modal-cancel">Fermer</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    document.getElementById('modal-close').onclick = closeModal;
    document.getElementById('modal-cancel').onclick = closeModal;
    const copyBtn = document.getElementById('modal-copy');
    if(copyBtn) copyBtn.onclick = ()=>{
      navigator.clipboard.writeText(modal.data);
      copyBtn.textContent = 'Copié !';
      setTimeout(()=>{ copyBtn.textContent='Copier'; }, 1500);
    };
    return;
  }

  if(modal.type === 'confirm'){
    const {message} = modal.data;
    overlay.innerHTML = `
      <div class="modal" style="width:420px;">
        <span class="close-x" id="modal-close">&times;</span>
        <h3>Confirmation</h3>
        <p style="font-size:14px;line-height:1.5;">${message}</p>
        <div class="modal-actions">
          <button class="btn" id="modal-cancel">Annuler</button>
          <button class="btn btn-primary" id="modal-confirm-yes">Confirmer</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    document.getElementById('modal-close').onclick = closeModal;
    document.getElementById('modal-cancel').onclick = closeModal;
    document.getElementById('modal-confirm-yes').onclick = async ()=>{
      const cb = modal.data.onConfirm;
      closeModal();
      if(cb) await cb();
    };
  }

  if(modal.type === 'alertMsg'){
    const {message} = modal.data;
    overlay.innerHTML = `
      <div class="modal" style="width:420px;">
        <span class="close-x" id="modal-close">&times;</span>
        <h3>Information</h3>
        <p style="font-size:14px;line-height:1.5;">${message}</p>
        <div class="modal-actions">
          <button class="btn btn-primary" id="modal-cancel">OK</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    document.getElementById('modal-close').onclick = closeModal;
    document.getElementById('modal-cancel').onclick = closeModal;
  }

  if(!document.getElementById('modal-overlay')) document.body.appendChild(overlay);
}

function showAlert(message){
  modal = {type:'alertMsg', data:{message}};
  render();
}

function showConfirm(message, onConfirm){
  modal = {type:'confirm', data:{message, onConfirm}};
  render();
}

function closeModal(){
  modal = null;
  const el = document.getElementById('modal-overlay');
  if(el) el.remove();
}

function localFallbackSummary(){
  let out = `SYNTHÈSE HEBDOMADAIRE — ${new Date().toISOString().slice(0,10)}\n\n`;
  state.projects.forEach(p=>{
    const fin = computeFinance(p);
    out += `${p.client} (${p.ref})\n`;
    out += `  Étape : ${STAGES[p.stage]} — Statut : ${healthLabel(p.health)}\n`;
    out += `  Échéance : ${p.deadline}\n`;
    out += `  Indépendants : ${p.freelancers.join(', ') || '—'}\n`;
    out += `  Avancement temps : ${fin.avancementTps.toFixed(0)}% (${fin.totalJours.toFixed(2)}j / ${fin.joursVendus.toFixed(2)}j vendus)\n`;
    out += `  Marge cumulée : ${formatEUR(fin.margeCumulee)}\n`;
    if(p.notes) out += `  Notes : ${p.notes}\n`;
    out += `\n`;
  });
  return out;
}

async function generateSummary(){
  const projectsWithFinance = state.projects.map(p=>({
    ...p,
    finance: computeFinance(p)
  }));
  const prompt = `Tu es assistant pour un dirigeant de société de conseil/dev qui pilote des déploiements ERP Odoo réalisés par des indépendants.
Voici l'état actuel des projets au format JSON (incluant avancement, temps consommé et rentabilité) :
${JSON.stringify(projectsWithFinance, null, 2)}

Rédige une synthèse hebdomadaire claire et professionnelle, en français, destinée à un usage interne (pas au client), avec :
- Un résumé global en 1-2 phrases
- Pour chaque projet : client, étape actuelle, statut, avancement temps/budget, marge, point d'attention si besoin
- Une section "Priorités de la semaine" qui liste les 2-3 actions les plus urgentes à traiter, en te basant sur les statuts bloqués/à surveiller, les échéances proches et les dérives de marge ou de consommation de jours

Ne mets pas de markdown, du texte brut structuré avec des tirets et des retours à la ligne.`;

  try{
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1200,
        messages: [{ role: "user", content: prompt }]
      })
    });
    const data = await response.json();
    const textBlocks = (data.content || []).filter(b=>b.type==='text').map(b=>b.text);
    const text = textBlocks.join('\n').trim();
    modal = {type:'summary', data: text || localFallbackSummary(), loading:false};
  }catch(e){
    console.error('Erreur génération synthèse', e);
    modal = {type:'summary', data: localFallbackSummary(), loading:false};
  }
  render();
}

loadData();
</script>
